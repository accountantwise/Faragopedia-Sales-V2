services:
  backend:
    build: ./backend
    volumes:
      - ${DATA_DIR:-./}/wiki:/app/wiki
      - ${DATA_DIR:-./}/sources:/app/sources
      - ${DATA_DIR:-./}/snapshots:/app/snapshots
      - ${DATA_DIR:-./}/archive:/app/archive
      - ${DATA_DIR:-./}/schema:/app/schema
    ports:
      - "${BACKEND_PORT:-8300}:8300"
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - WISECRAWLER_BASE_URL=${WISECRAWLER_BASE_URL}
      - WISECRAWLER_API_KEY=${WISECRAWLER_API_KEY}
    restart: unless-stopped

  frontend:
    build: ./frontend
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_ALLOWED_HOST=${VITE_ALLOWED_HOST}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    restart: unless-stopped
